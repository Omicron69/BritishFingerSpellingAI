<script type="module">
  const videoElement = document.getElementsByClassName('input_video')[0];
  const canvasElement = document.getElementsByClassName('output_canvas')[0];
  const canvasCtx = canvasElement.getContext('2d');

  function isFingerExtended(landmarks, tipIndex, pipIndex) {
    return landmarks[tipIndex].y < landmarks[pipIndex].y;
  }

  function isCurledFinger(landmarks, tipIndex, pipIndex, mcpIndex) {
    const tip = landmarks[tipIndex];
    const pip = landmarks[pipIndex];
    const mcp = landmarks[mcpIndex];

    return tip.y > pip.y && tip.y > mcp.y;
  }

  function getPalmCenter(landmarks) {
    return {
      x: (landmarks[0].x + landmarks[5].x + landmarks[9].x + landmarks[13].x + landmarks[17].x) / 5,
      y: (landmarks[0].y + landmarks[5].y + landmarks[9].y + landmarks[13].y + landmarks[17].y) / 5,
      z: (landmarks[0].z + landmarks[5].z + landmarks[9].z + landmarks[13].z + landmarks[17].z) / 5
    };
  }

  function distance3D(pointA, pointB) {
    return Math.hypot(
      pointA.x - pointB.x,
      pointA.y - pointB.y,
      pointA.z - pointB.z
    );
  }

  function isCrossingHand(landmarks) {
    return isFingerExtended(landmarks, 8, 6) &&
      isFingerExtended(landmarks, 12, 10) &&
      isCurledFinger(landmarks, 16, 14, 13) &&
      isCurledFinger(landmarks, 20, 18, 17);
  }

  function hasDiagonalHandLine(landmarks) {
    const indexMcp = landmarks[5];
    const pinkyMcp = landmarks[17];
    const diagonalX = Math.abs(indexMcp.x - pinkyMcp.x);
    const diagonalY = Math.abs(indexMcp.y - pinkyMcp.y);

    return diagonalX > 0.08 && diagonalY > 0.05;
  }

  function isCompactThumbShape(landmarks) {
    return isCurledFinger(landmarks, 4, 3, 2) ||
      distance3D(landmarks[4], landmarks[5]) < 0.18;
  }

  function isBackHandOpen(landmarks) {
    return isFingerExtended(landmarks, 12, 10) &&
      isFingerExtended(landmarks, 16, 14) &&
      isFingerExtended(landmarks, 20, 18);
  }

  function isSignA(backHand, frontHand) {
    if (!isBackHandOpen(backHand) || !isCrossingHand(frontHand)) {
      return false;
    }

    const backPalmCenter = getPalmCenter(backHand);
    const frontThumbTip = frontHand[4];
    const frontIndexMcp = frontHand[5];
    const frontMiddleMcp = frontHand[9];
    const backIndexMcp = backHand[5];
    const backMiddleMcp = backHand[9];

    const crossedPalmContact = distance3D(frontIndexMcp, backPalmCenter) < 0.18 ||
      distance3D(frontMiddleMcp, backPalmCenter) < 0.18;
    const thumbNearBackPalm = distance3D(frontThumbTip, backPalmCenter) < 0.22;
    const knuckleContact = distance3D(frontIndexMcp, backIndexMcp) < 0.22 ||
      distance3D(frontMiddleMcp, backMiddleMcp) < 0.22;

    return hasDiagonalHandLine(frontHand) &&
      isCompactThumbShape(frontHand) &&
      crossedPalmContact &&
      thumbNearBackPalm &&
      knuckleContact;
  }

  function onResults(results) {
    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    canvasCtx.scale(-1, 1);
    canvasCtx.translate(-canvasElement.width, 0);
    canvasCtx.drawImage(
      results.image, 0, 0, canvasElement.width, canvasElement.height);
    if (results.multiHandLandmarks) {
      let detectedSignA = false;
      for (const landmarks of results.multiHandLandmarks) {
        drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS,
          { color: '#b042ff', lineWidth: 8 });
        drawLandmarks(canvasCtx, landmarks, { color: '#ff2400', lineWidth: 2 });
      }

      if (results.multiHandLandmarks.length >= 2) {
        const [firstHand, secondHand] = results.multiHandLandmarks;
        detectedSignA = isSignA(firstHand, secondHand) || isSignA(secondHand, firstHand);
      }

      console.log(JSON.stringify(results.multiHandLandmarks, null, 2));

      if (results.multiHandLandmarks.length >= 1) {
        const accuracyText = document.getElementById("accuracy");
        accuracyText.textContent = detectedSignA ? "100%" : "0%";
      }
    }
    canvasCtx.restore();
  }

  const hands = new Hands({locateFile: (file) => {
    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
  }});
  hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5
  });
  hands.onResults(onResults);

  const camera = new Camera(videoElement, {
    onFrame: async () => {
      await hands.send({image: videoElement});
    },
    width: 1920,
    height: 1080
  });
  camera.start();
</script>

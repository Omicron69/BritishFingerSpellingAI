<script type="module">
  const videoElement = document.getElementsByClassName('input_video')[0];
  const canvasElement = document.getElementsByClassName('output_canvas')[0];
  const canvasCtx = canvasElement.getContext('2d');

  function distance3D(pointA, pointB) {
    return Math.hypot(
      pointA.x - pointB.x,
      pointA.y - pointB.y,
      pointA.z - pointB.z
    );
  }

  function isFingerCurved(landmarks, tipIndex, pipIndex, mcpIndex) {
    const tip = landmarks[tipIndex];
    const pip = landmarks[pipIndex];
    const mcp = landmarks[mcpIndex];

    return tip.y < mcp.y && tip.y > pip.y - 0.08;
  }

  function isSignC(landmarks) {
    const wrist = landmarks[0];
    const thumbTip = landmarks[4];
    const indexTip = landmarks[8];
    const middleTip = landmarks[12];
    const ringTip = landmarks[16];
    const pinkyTip = landmarks[20];
    const indexMcp = landmarks[5];
    const middleMcp = landmarks[9];
    const pinkyMcp = landmarks[17];

    const thumbIndexGap = distance3D(thumbTip, indexTip);
    const thumbPinkyGap = distance3D(thumbTip, pinkyTip);
    const indexPinkyGap = distance3D(indexTip, pinkyTip);
    const handWidth = distance3D(indexMcp, pinkyMcp);
    const handHeight = distance3D(wrist, middleTip);

    const curvedIndex = isFingerCurved(landmarks, 8, 6, 5);
    const curvedMiddle = isFingerCurved(landmarks, 12, 10, 9);
    const curvedRing = isFingerCurved(landmarks, 16, 14, 13);
    const curvedPinky = isFingerCurved(landmarks, 20, 18, 17);

    const thumbFormsOpenSide = thumbTip.x < indexTip.x && thumbIndexGap > handWidth * 0.45;
    const openArc = thumbIndexGap < handWidth * 1.35 && thumbPinkyGap > handWidth * 0.7;
    const fingersStacked = indexPinkyGap < handWidth * 0.95;
    const handIsUpright = handHeight > handWidth * 0.9;

    return curvedIndex &&
      curvedMiddle &&
      curvedRing &&
      curvedPinky &&
      thumbFormsOpenSide &&
      openArc &&
      fingersStacked &&
      handIsUpright;
  }






//This was edited through the mediapipe and tensorflow examples that I edited to suit my needs
  function onResults(results) {
    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    canvasCtx.scale(-1, 1);
    canvasCtx.translate(-canvasElement.width, 0);
    canvasCtx.drawImage(
      results.image, 0, 0, canvasElement.width, canvasElement.height);
    if (results.multiHandLandmarks) {
      let detectedPeaceSign = false;
      for (const landmarks of results.multiHandLandmarks) {
        drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS,
          { color: '#b042ff', lineWidth: 8 });
        drawLandmarks(canvasCtx, landmarks, { color: '#ff2400', lineWidth: 2 });

        detectedPeaceSign = isSignC(landmarks);
        if (detectedPeaceSign) break;
      }

      //This is for console log to check if the numbers I put is right enough
      console.log(JSON.stringify(results.multiHandLandmarks, null, 2));

      if (results.multiHandLandmarks.length === 1) {
        const accuracyText = document.getElementById("accuracy");
        accuracyText.textContent = detectedPeaceSign ? "100%" : "0%";
      }
    }
    canvasCtx.restore();
  }

  const hands = new Hands({locateFile: (file) => {
    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
  }});
  hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 1,
    minDetectionConfidence: 0.5,
    minTrackingConfidence: 0.5
  });
  hands.onResults(onResults);

  const camera = new Camera(videoElement, {
    onFrame: async () => {
      await hands.send({image: videoElement});
    },
    width: 1920,
    height: 1080
  });
  camera.start();
</script>
